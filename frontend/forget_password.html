<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" type="text/css" href="css/forget_password.css?v=1.0">
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        <div class="credentials-panel signin">
            <h2 class="slide-element">Forgot Password</h2>

            <form action="#" onsubmit="handleForgotPassword(event)">
                <div class="field-wrapper slide-element">
                    <input type="email" id="email" required>
                    <label>Email Address</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">
                        Send Reset Link
                    </button>
                </div>

                <div id="message" class="slide-element"
                     style="color: green; font-weight: 600; margin-top: 10px; display: none;">
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">
                RESET<br>PASSWORD
            </h2>
        </div>
    </div>

    <script>
        function handleForgotPassword(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const message = document.getElementById('message');

            if (email === "") {
                return;
            } else {
                message.style.display = 'block';
                message.textContent = 'Reset link sent to your email. Redirecting...';

                setTimeout(function () {
                    window.location.href = "reset_password.html";
                }, 2000);
            }
        }
    </script>

    <script src="js/forget_password.js"></script>
</body>
</html>
