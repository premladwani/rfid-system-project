<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Role</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Poppins", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0080ff,#99f2c8);
}

.container{
text-align:center;
}

.title{
color:white;
font-size:32px;
margin-bottom:10px;
}

.subtitle{
color:#eaeaea;
margin-bottom:40px;
}

.cards{
display:flex;
gap:40px;
}

.card{
width:260px;
padding:35px 25px;
border-radius:18px;
background:rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.25);
text-align:center;
cursor:pointer;
transition:0.4s;
color:white;
}

.card:hover{
transform:translateY(-12px) scale(1.04);
box-shadow:0 15px 35px rgba(0,0,0,0.3);
background:rgba(255,255,255,0.25);
}

.icon-box{
width:70px;
height:70px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-bottom:20px;
}

.user-icon{
background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.admin-icon{
background:linear-gradient(135deg,#ff6a00,#ee0979);
}

.card h3{
font-size:22px;
margin-bottom:10px;
}

.card p{
font-size:14px;
color:#eaeaea;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Choose Your Role</h1>
<p class="subtitle">Select how you want to continue</p>

<div class="cards">

<div class="card" onclick="selectRole('user')">

<div class="icon-box user-icon">
<i class="fa-solid fa-user"></i>
</div>

<h3>User</h3>


</div>

<div class="card" onclick="selectRole('admin')">

<div class="icon-box admin-icon">
<i class="fa-solid fa-user-shield"></i>
</div>

<h3>Admin</h3>


</div>

</div>
</div>

<script>

function selectRole(role){

if(role === "user"){
window.location.href="userregister.html?showRegister=true";
}
else{
window.location.href="adminregister.html";
}

}

</script>

</body>
</html>
