<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" type="text/css" href="css/reset_password.css?v=1.0">
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>
        <div class="credentials-panel signin">
            <h2 class="slide-element">Reset Password</h2>
            <form action="#" onsubmit="handleResetPassword(event)">
                <div class="field-wrapper slide-element">
                    <input type="password" id="newPassword" required>
                    <label for="">New Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="confirmPassword" required>
                    <label for="">Confirm Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Reset Password</button>
                </div>

                <div id="message" class="slide-element" style="color: green; font-weight: 600; margin-top: 10px; display: none;"></div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">NEW<br>PASSWORD</h2>
        </div>
    </div>

    <script>
    function handleResetPassword(event) {
        event.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const message = document.getElementById('message');
        
        if(newPassword === "" || confirmPassword === "") {
            message.style.display = 'block';
            message.textContent = 'Please fill in all fields.';
            return;
        } else if(newPassword !== confirmPassword) {
            message.style.display = 'block';
            message.textContent = 'Passwords do not match.';
            return;
        } else if(newPassword.length < 6) {
            message.style.display = 'block';
            message.textContent = 'Password must be at least 6 characters long.';
            return;
        } else {
            message.style.display = 'block';
            message.textContent = 'Password reset successfully! Redirecting to login...';
            setTimeout(function(){
                window.location.href = "userregister.html";
            },2000);
        }
    }
    </script>
    <script src="js/reset_password.js"></script>
</body>

</html>
